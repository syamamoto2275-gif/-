<style>
:root{

  --border:#E2E0D7; --border-strong:#CFCDC3; --border-accent:#85B7EB; --bg-accent:#E6F1FB; --radius:8px;
  --font-sans:'Hiragino Kaku Gothic ProN','Yu Gothic UI','Segoe UI',sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#1E1D1B; --surface-0:#1E1D1B; --surface-1:#272624; --surface-2:#2F2E2B;
    --text-primary:#ECEBE7; --text-secondary:#B4B2A9; --text-muted:#88877F; --text-accent:#85B7EB;
    --border:#3A3935; --border-strong:#4A4944; --border-accent:#185FA5; --bg-accent:#0C447C;
  }
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text-primary);font-family:var(--font-sans);display:flex;justify-content:center;padding:24px 12px;}
.wrap{width:100%;max-width:720px;}
.ti{font-style:normal;}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes wkA{0%{transform:translate(0,0)}50%{transform:translate(0,180px)}100%{transform:translate(0,0)}}
@keyframes wkB{0%{transform:translate(0,0)}50%{transform:translate(0,-170px)}100%{transform:translate(0,0)}}
@keyframes wkC{0%{transform:translate(0,0)}50%{transform:translate(80px,0)}100%{transform:translate(0,0)}}
@keyframes stepy{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.island{position:absolute;background:#C9CDD6;border:2px solid #AEB3BD;border-radius:9px;}
.zl{position:absolute;font-size:11px;color:#5F5E5A;background:#F1EFE8;border:0.5px solid #D3D1C7;border-radius:999px;padding:1px 9px;z-index:4;white-space:nowrap;}
.dk{position:absolute;width:64px;height:37px;background:#DDE0E6;border:1px solid #B0B4BC;border-radius:3px;}
.mn{position:absolute;top:4px;left:50%;transform:translateX(-50%);width:28px;height:15px;background:#2B2F3A;border-radius:2px;}
.scn{position:absolute;inset:1px;border-radius:1px;}
.cha{position:absolute;width:12px;height:13px;background:#3C414C;border-radius:50% 50% 35% 35%;}
.pl{position:absolute;width:20px;height:20px;border-radius:50% 50% 42% 42%;background:#3B6D11;}
.pl::after{content:"";position:absolute;left:6px;bottom:-3px;width:8px;height:5px;background:#A8814F;border-radius:0 0 2px 2px;}
.per{position:absolute;cursor:pointer;z-index:5;display:flex;flex-direction:column;align-items:center;}
.tag{font-size:9px;color:#fff;background:#2B2F3A;border-radius:6px;padding:1px 6px;white-space:nowrap;display:flex;align-items:center;gap:3px;margin-bottom:2px;}
.av{position:relative;width:22px;height:22px;}
.face{position:absolute;inset:0;border-radius:50%;background:#F7CBB0;}
.ey{position:absolute;top:10px;width:4px;height:5px;border-radius:50%;background:#2C2C2A;}
.ey::after{content:"";position:absolute;top:1px;right:0.5px;width:1.5px;height:1.5px;border-radius:50%;background:#fff;}
.bl{position:absolute;top:14px;width:3px;height:2px;border-radius:50%;background:#F0997B;opacity:.6;}
.mo{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:3px;height:2px;background:#C0654A;border-radius:0 0 3px 3px;}
.hr{position:absolute;top:-2px;left:-1px;width:24px;height:11px;border-radius:12px 12px 8px 8px;}
.hbk{position:absolute;left:-3px;top:2px;width:28px;height:24px;border-radius:14px 14px 12px 12px;}
.bd{width:20px;height:11px;border-radius:7px 7px 3px 3px;margin-top:-1px;}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#2B2F3A;color:#fff;font-size:13px;padding:10px 16px;border-radius:8px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:99;max-width:90%;}
#toast.show{opacity:1;}
</style>
</head>

function goro(name){
