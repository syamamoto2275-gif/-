  .ts{font-family:'Yu Gothic UI','Meiryo',system-ui,sans-serif;font-weight:400;fill:#6b6b6b;}
  .box{fill:#ffffff;stroke:#c9c9c9;stroke-width:1.5;}
  .pillar{fill:#f4f2ee;stroke:#b8b3a8;stroke-width:1.5;}
  .lead{fill:#efece6;stroke:#a8a195;stroke-width:2;}
  .plan{stroke-dasharray:5 4;}
  .ln{stroke:#c2c2c2;stroke-width:1.5;fill:none;}
  .cap{font-family:'Yu Gothic UI','Meiryo',system-ui,sans-serif;fill:#9a9a9a;}
</style>
