<svg width="680" height="548" viewBox="0 0 680 548" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc">
<title id="ttl">SEED/ARCSグループ 事業組織図（正式版 2026-06-28）</title>
<desc id="desc">山本史朗代表の下、SEED（EC事業＝Amazon・楽天・auPAYマーケット・ペライチ、ペット事業＝shop fuu・卸売・イベント、サテライトオフィス事業構想）と、ARCS（就労継続支援A型かみふうせん・B型かみひこうき・相談支援事業所構想・地域共生雇用センター構想）の2本柱からなる事業組織図。</desc>
<style>
  .bg{fill:#ffffff;}
  .th{font-family:Georgia,'Yu Mincho',serif;font-weight:700;fill:#1a1a1a;}
